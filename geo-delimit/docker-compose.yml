version: '3.9'

services:
  # ── PostgreSQL + PostGIS ───────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: geodelimit_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: geodelimit
      POSTGRES_USER: geodelimit
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geodelimit -d geodelimit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Node.js ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geodelimit_backend
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: geodelimit
      DB_USER: geodelimit
      DB_PASSWORD: secret
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend React ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geodelimit_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      REACT_APP_MAPBOX_TOKEN: ${MAPBOX_TOKEN}
      REACT_APP_API_URL: http://localhost:3001/api

volumes:
  pgdata:
    driver: local
